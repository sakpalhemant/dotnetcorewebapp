- task: Docker@2
  inputs:
    containerRegistry: 'docker-sakpalhemant'
    repository: 'sakpalhemant/dotnetcorewebapp'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    buildContext: ' .'
