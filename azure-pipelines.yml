# ASP.NET Core
# Build and test ASP.NET Core projects targeting .NET Core.
# Add steps that run tests, create a NuGet package, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
- master

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'

steps:

- task: SonarCloudPrepare@4
  inputs:
    SonarQube: 'sonarqubecloud'
    organization: 'devops-anil-1'
    scannerMode: 'dotnet'
    projectKey: 'ddevops-anil_testwebProject'
    projectName: 'testwebProject'


- script: dotnet build --configuration $(buildConfiguration)
  displayName: 'dotnet build $(buildConfiguration)'

# do this after other tasks such as build
- task: DotNetCoreCLI@2
  inputs:
    command: test
    projects: '**/TestProject/*.csproj'
    arguments: '--configuration $(buildConfiguration)'
  displayName: 'dotnet build Test Project'

# Publish code coverage results v1
# Publish Cobertura or JaCoCo code coverage results from a build.
- task: PublishCodeCoverageResults@2
  inputs:
    summaryFileLocation: '$(System.DefaultWorkingDirectory)/dotnetcorewebapp/coverage.xml.'
    pathToSources: '$(System.DefaultWorkingDirectory)/dotnetcorewebapp/'
  displayName: 'Code Coverage'

- task: PublishPipelineArtifact@1
  inputs:
    targetPath: '$(Pipeline.Workspace)'
    artifact: 'mywebapp'
    publishLocation: 'pipeline'
    

# - task: PublishPipelineArtifact@1
#   inputs:
#     targetPath: $(System.DefaultWorkingDirectory)/dotnetcorewebapp
#     artifactName: WebApp

- task: SonarCloudAnalyze@4
  inputs:
    jdkversion: 'JAVA_HOME_17_X64'


- task: SonarCloudPublish@4
  inputs:
    pollingTimeoutSec: '600'
    
